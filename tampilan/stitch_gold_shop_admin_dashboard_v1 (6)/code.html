<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Admin Secure Login v1 - Gold Shop</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f9d406",
                        "background-light": "#f8f8f5",
                        "background-dark": "#0a0a0c",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(35, 32, 15, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(249, 212, 6, 0.2);
        }
        .shimmer-btn {
            position: relative;
            overflow: hidden;
        }
        .shimmer-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to bottom right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0) 40%,
                rgba(255, 255, 255, 0.4) 50%,
                rgba(255, 255, 255, 0) 60%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: rotate(45deg);
            pointer-events: none;
        }
        .bg-pattern {
            background: 
                radial-gradient(circle at 20% 30%, rgba(249, 212, 6, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(249, 212, 6, 0.08) 0%, transparent 40%),
                linear-gradient(135deg, #0a0a0c 0%, #1a1a1f 100%);
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-white min-h-screen selection:bg-primary selection:text-black">
<div class="relative min-h-screen flex flex-col items-center justify-center bg-pattern p-4 overflow-hidden">
<!-- Animated Background Elements (Static representations) -->
<div class="absolute top-1/4 left-1/4 w-64 h-64 bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-primary/5 rounded-full blur-[150px]"></div>
<!-- Header/Navbar style wrapper for consistency -->
<header class="absolute top-0 left-0 w-full flex items-center justify-between px-10 py-6">
<div class="flex items-center gap-3">
<div class="size-8 text-primary">
<svg fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg"><path d="M6 6H42L36 24L42 42H6L12 24L6 6Z" fill="currentColor"></path></svg>
</div>
<h2 class="text-white text-xl font-bold tracking-tight uppercase">Gold Shop <span class="text-primary/80">Admin</span></h2>
</div>
<button class="flex min-w-[100px] cursor-pointer items-center justify-center rounded-xl h-10 px-4 bg-primary/10 border border-primary/20 text-primary text-sm font-bold hover:bg-primary/20 transition-all">
<span class="truncate">Support</span>
</button>
</header>
<!-- Main Login Card -->
<main class="relative z-10 w-full max-w-[480px]">
<div class="glass-card rounded-xl p-8 md:p-12 shadow-2xl flex flex-col gap-8 border border-white/5">
<!-- Logo & Heading -->
<div class="flex flex-col items-center text-center">
<div class="size-20 bg-primary rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(249,212,6,0.3)] mb-6">
<span class="material-symbols-outlined text-4xl text-black font-bold">payments</span>
</div>
<h1 class="text-white text-3xl font-bold tracking-tight mb-2">Secure Portal</h1>
<p class="text-slate-400 text-sm">Authorized personnel only. Access monitored.</p>
</div>
<!-- Form Fields -->
<form class="flex flex-col gap-5" onsubmit="return false;">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="text-slate-300 text-sm font-semibold px-1">Admin Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">mail</span>
</div>
<input class="w-full h-14 bg-black/40 border border-white/10 rounded-xl pl-12 pr-4 text-white placeholder:text-slate-600 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all text-base" placeholder="name@goldshop.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center px-1">
<label class="text-slate-300 text-sm font-semibold">Security Password</label>
<a class="text-primary/80 text-xs font-medium hover:text-primary" href="#">Forgot?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-500 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-xl">lock</span>
</div>
<input class="w-full h-14 bg-black/40 border border-white/10 rounded-xl pl-12 pr-12 text-white placeholder:text-slate-600 focus:outline-none focus:ring-1 focus:ring-primary focus:border-primary transition-all text-base" placeholder="••••••••••••" type="password"/>
<div class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer text-slate-500 hover:text-slate-300">
<span class="material-symbols-outlined text-xl">visibility</span>
</div>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-3 px-1 py-1">
<input class="w-5 h-5 rounded border-white/10 bg-black/40 text-primary focus:ring-primary focus:ring-offset-background-dark" id="remember" type="checkbox"/>
<label class="text-slate-400 text-sm cursor-pointer select-none" for="remember">Remember this workstation</label>
</div>
<!-- Login Button -->
<button class="shimmer-btn w-full h-14 bg-primary text-black font-extrabold text-lg rounded-xl shadow-[0_4px_20px_rgba(249,212,6,0.2)] hover:shadow-[0_4px_25px_rgba(249,212,6,0.4)] hover:translate-y-[-1px] active:translate-y-[1px] transition-all flex items-center justify-center gap-2 mt-2" type="submit">
<span>ACCESS VAULT</span>
<span class="material-symbols-outlined">login</span>
</button>
</form>
<!-- Security Badges -->
<div class="pt-6 border-t border-white/5 flex flex-wrap justify-center items-center gap-6 opacity-60 grayscale hover:grayscale-0 transition-all duration-500">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-primary">verified_user</span>
<span class="text-[10px] font-bold text-white tracking-widest uppercase">SSL Encrypted</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-primary">security</span>
<span class="text-[10px] font-bold text-white tracking-widest uppercase">2FA Active</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-primary">gpp_good</span>
<span class="text-[10px] font-bold text-white tracking-widest uppercase">AES-256</span>
</div>
</div>
</div>
<!-- Footer Info -->
<p class="text-center mt-8 text-slate-500 text-xs">
                © 2024 Gold Shop Trading Ltd. All Rights Reserved.<br/>
                Terminal ID: GS-ADMIN-NYC-04
            </p>
</main>
<!-- Aesthetic Decoration -->
<div class="absolute top-0 right-0 p-12 opacity-10 pointer-events-none">
<span class="material-symbols-outlined text-[300px] text-primary select-none">architecture</span>
</div>
<div class="absolute bottom-0 left-0 p-12 opacity-5 pointer-events-none">
<div class="w-64 h-64 border-8 border-primary rounded-full"></div>
</div>
</div>
</body></html>
